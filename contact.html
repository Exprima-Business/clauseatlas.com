<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — ClauseAtlas</title>
    <meta name="description" content="Get in touch with the ClauseAtlas team. Questions about public sector compliance or our platform? We'd love to hear from you.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        .page-hero {
            padding: 140px 24px 60px;
            background: linear-gradient(180deg, var(--blue-50) 0%, var(--white) 100%);
            text-align: center;
        }
        .page-hero h1 {
            font-size: 2.75rem;
            font-weight: 800;
            color: var(--blue-900);
            letter-spacing: -0.02em;
            margin-bottom: 16px;
        }
        .page-hero p {
            font-size: 1.125rem;
            color: var(--gray-500);
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.7;
        }
        .contact-container {
            max-width: 560px;
            margin: 0 auto;
            padding: 60px 24px 80px;
        }
        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .form-group label {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--gray-700);
        }
        .form-group input,
        .form-group textarea {
            padding: 12px 16px;
            border: 1px solid var(--gray-200);
            border-radius: 8px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            color: var(--gray-700);
            background: var(--white);
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--blue-500);
            box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.1);
        }
        .form-group textarea {
            min-height: 140px;
            resize: vertical;
        }
        .contact-info {
            margin-top: 48px;
            padding-top: 32px;
            border-top: 1px solid var(--gray-100);
            text-align: center;
        }
        .contact-info p {
            font-size: 0.9375rem;
            color: var(--gray-500);
            line-height: 1.7;
        }
        .contact-info a {
            color: var(--blue-600);
            text-decoration: none;
            font-weight: 500;
        }
        .contact-info a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <img src="logo.png" alt="ClauseAtlas" class="logo-img">
            </a>
            <div class="nav-links">
                <a href="index.html#features">Features</a>
                <a href="index.html#frameworks">Regulations</a>
                <a href="index.html#how-it-works">How It Works</a>
                <a href="index.html#early-access">Early Access</a>
            </div>
            <div class="nav-actions">
                <a href="index.html#early-access" class="btn btn-primary">Join the Beta</a>
            </div>
        </div>
    </nav>

    <section class="page-hero">
        <h1>Contact Us</h1>
        <p>Have a question about ClauseAtlas or public sector compliance? We'd love to hear from you.</p>
    </section>

    <div class="contact-container">
        <form class="contact-form" action="https://api.web3forms.com/submit" method="POST">
            <input type="hidden" name="access_key" value="4c87988d-0d5e-4720-9621-849b998932a8">
            <input type="hidden" name="subject" value="ClauseAtlas Contact Form">
            <input type="hidden" name="redirect" value="https://www.clauseatlas.com/thank-you.html">
            <input type="checkbox" name="botcheck" class="hidden" style="display:none">

            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Your name" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="you@company.com" required>
            </div>
            <div class="form-group">
                <label for="organization">Organization <span style="color: var(--gray-400); font-weight: 400;">(optional)</span></label>
                <input type="text" id="organization" name="organization" placeholder="Your organization">
            </div>
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" placeholder="How can we help?" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;">Send Message</button>
        </form>

        <div class="contact-info">
            <p>You can also reach us directly at<br><a href="mailto:contact@exprima.io">contact@exprima.io</a></p>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 ClauseAtlas. All rights reserved.</p>
            </div>
        </div>
    </footer>
</body>
</html>
