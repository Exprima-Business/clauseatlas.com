<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You — ClauseAtlas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        .thank-you {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 24px;
            background: linear-gradient(180deg, var(--blue-50) 0%, var(--white) 100%);
        }
        .thank-you-content {
            max-width: 520px;
        }
        .thank-you-icon {
            width: 80px;
            height: 80px;
            background: var(--blue-100);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }
        .thank-you-content h1 {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--blue-900);
            margin-bottom: 16px;
            letter-spacing: -0.02em;
        }
        .thank-you-content p {
            font-size: 1.125rem;
            color: var(--gray-500);
            line-height: 1.7;
            margin-bottom: 32px;
        }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <img src="logo.png" alt="ClauseAtlas" class="logo-img">
            </a>
        </div>
    </nav>
    <section class="thank-you">
        <div class="thank-you-content">
            <div class="thank-you-icon">
                <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
                    <circle cx="20" cy="20" r="18" stroke="#0066CC" stroke-width="2.5"/>
                    <path d="M12 20l6 6 10-10" stroke="#0066CC" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <h1>You're on the list!</h1>
            <p>Thanks for signing up for the ClauseAtlas beta. We'll be in touch as soon as early access opens. In the meantime, keep an eye on your inbox.</p>
            <a href="index.html" class="btn btn-primary btn-lg">Back to ClauseAtlas</a>
        </div>
    </section>
</body>
</html>
